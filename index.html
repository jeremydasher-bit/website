<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeremy's Computer - Windows 98</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Desktop background -->
  <div id="desktop" class="desktop">
    <!-- Desktop icons -->
    <div id="desktop-icons" class="desktop-icons">
      <div class="desktop-icon" data-folder="Photos" title="Double-click to open">
        <div class="desktop-icon-image icon-folder"></div>
        <span class="desktop-icon-label">Photos</span>
      </div>
      <div class="desktop-icon" data-folder="Blogs" title="Double-click to open">
        <div class="desktop-icon-image icon-folder"></div>
        <span class="desktop-icon-label">Blogs</span>
      </div>
      <div class="desktop-icon" data-folder="Documents" title="Double-click to open">
        <div class="desktop-icon-image icon-folder"></div>
        <span class="desktop-icon-label">Documents</span>
      </div>
      <div class="desktop-icon" data-folder="Download" title="Double-click to open">
        <div class="desktop-icon-image icon-folder"></div>
        <span class="desktop-icon-label">Download</span>
      </div>
    </div>

    <!-- Container for Explorer windows -->
    <div id="windows-container"></div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar" class="taskbar">
    <button id="start-btn" class="start-btn" type="button">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='24' height='24'%3E%3Cpath fill='%2380c0ff' d='M2 2h28v28H2z'/%3E%3Cpath fill='%23ff8000' d='M2 2l14 14L2 30V2z'/%3E%3Cpath fill='%23008000' d='M16 2v12l14-6-14 18V2z'/%3E%3Cpath fill='%23ff0000' d='M16 16l14 14H16V16z'/%3E%3C/svg%3E" alt="Windows" class="start-logo">
      <span class="start-text">Start</span>
    </button>
    <div id="taskbar-items" class="taskbar-items"></div>
    <div class="taskbar-clock-wrap">
      <div id="clock" class="taskbar-clock"></div>
    </div>
  </div>

  <!-- Start menu -->
  <div id="start-menu" class="start-menu hidden">
    <div class="start-menu-content">
      <div class="start-menu-header">
        <span class="start-menu-title">Windows 98</span>
      </div>
      <div class="start-menu-item" data-action="programs">Programs</div>
      <div class="start-menu-item" data-action="documents">Documents</div>
      <div class="start-menu-item" data-action="settings">Settings</div>
      <div class="start-menu-divider"></div>
      <div class="start-menu-item" data-action="photos">Photos</div>
      <div class="start-menu-item" data-action="blogs">Blogs</div>
      <div class="start-menu-item" data-action="documents-folder">Documents</div>
      <div class="start-menu-item" data-action="download">Download</div>
      <div class="start-menu-divider"></div>
      <div class="start-menu-item" data-action="shutdown">Shut Down...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
